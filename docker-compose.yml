# =====================================================================
# Multica Telegram Bridge — docker-compose
#
# Uso:
#   1. Copie .env.example para .env e preencha os valores.
#   2. docker compose up -d --build
#
# Caso o bridge rode na MESMA stack do Multica, ajuste no .env:
#   MULTICA_API_BASE_URL=http://backend:8080
#   MULTICA_WS_URL=ws://backend:8080/ws
# e use a rede externa do Multica (descomente o bloco "networks" abaixo).
# =====================================================================

services:
  multica-telegram-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    image: multica-telegram-bridge:latest
    container_name: multica-telegram-bridge
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BRIDGE_PORT:-3333}:3333"
    # Segurança em runtime:
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3333/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # Para integrar com a stack do Multica, descomente:
    # networks:
    #   - multica

# networks:
#   multica:
#     external: true
